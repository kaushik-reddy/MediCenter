<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D4FE0"/>
      <stop offset="1" stop-color="#7C5CFC"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef0ff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#2a1a63" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- soft glow -->
  <circle cx="380" cy="150" r="150" fill="#ffffff" opacity="0.10"/>

  <!-- medical cross -->
  <g filter="url(#soft)">
    <rect x="222" y="128" width="68" height="256" rx="34" fill="url(#pill)"/>
    <rect x="128" y="222" width="256" height="68" rx="34" fill="url(#pill)"/>
  </g>

  <!-- accent dot -->
  <circle cx="256" cy="256" r="20" fill="#7C5CFC" opacity="0.18"/>
</svg>
